<!doctype html>
<html class="no-js" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robert Gouveia | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <script defer src="js/app.js"></script>
  <script src="https://kit.fontawesome.com/33b68c81a7.js" crossorigin="anonymous"></script>
</head>
<body>

  <header>
    <section>
      <nav>
        <section>
          <h1>ROBGEE</h1>
          <span>®</span>
        </section>
        <i class="fa-solid fa-bars menu"></i>
      </nav>
      <ul class="toggle_menu">
        <li><a href="#" class="nav_item">PROJECTS</a></li>
        <li><a href="#" class="nav_item">ABOUT</a></li>
        <li><a href="#contact" class="nav_item">LET'S TALK</a></li>
      </ul>
    </section>
    <section>
      <h1>FULL STACK</h1>
      <h2>DEVELOPER PORTFOLIO</h2>
      <h3>Code That Speaks for Itself.</h3>
    </section>
  </header>

  <section class="images">
    <div class="img-container"></div>
    <div class="img-container"></div>
  </section>

  <main>
    <section>
      <h1>PERSONAL PROJECTS</h1>
      <h1>View All</h1>
    </section>
    <ul id="repos">
    </ul>
    <button id="load">Load More</button>

    <section class="contact" id="contact">
      <form action="https://formsubmit.co/cdd8949efac328ee56c35e1000a2ef7e" method="POST">
        <label for="email">
          Email:
          <input id="email" type="email" name="email" required>
        </label>
        <label for="type">
          Type:
          <select name="type" id="type" required>
            <option value="job_offer">Job Offering</option>
            <option value="collaboration">Collaboration</option>
            <option value="other">Other Reason</option>
          </select>
        </label>
        <label for="message">
          Message:
          <textarea id="message" name="message" rows="4" required></textarea>
        </label>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

</body>

</html>
